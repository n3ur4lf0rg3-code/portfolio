<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Full Stack Live</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: #e2e8f0;
    margin: 0;
}

#services {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
gap: 16px;
}

#contacts {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
}

.contact-card {
    background: #1e293b;
    padding: 16px;
    border-radius: 12px;
    border: 1px solid #334155;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.contact-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.contact-name {
    font-weight: bold;
    font-size: 16px;
}

.contact-time {
    font-size: 12px;
    color: #94a3b8;
}

.contact-email {
    font-size: 13px;
    color: #cbd5f5;
}

.contact-message {
    font-size: 14px;
    line-height: 1.4;
}

.highlight {
    border: 2px solid #22c55e;
}
    
section {
    padding: 40px;
}

h1, h2 {
    margin-bottom: 20px;
}

.card {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

input, textarea, button {
    display: block;
    width: 100%;
    margin-bottom: 10px;
    padding: 10px;
}

button {
    background: #22c55e;
    border: none;
    color: black;
    cursor: pointer;
}

.status {
    margin-top: 10px;
}

.error { color: #f87171; }
.success { color: #4ade80; }
.loading { color: #facc15; }
</style>
</head>

<body>

<!-- HERO -->
<section>
    <h1>Plataforma Full Stack (Live)</h1>
    <p>Datos consumidos desde API real</p>
</section>

<!-- SERVICIOS -->
<section>
    <h2>Servicios</h2>
    <div id="services"></div>
    <p id="servicesStatus" class="status"></p>
</section>

<section>
    <h2>Contactos</h2>
    <div id="contacts"></div>
</section>
    
<!-- CONTACTO -->
<section>
    <h2>Contacto</h2>

    <form id="contactForm">
        <input type="text" id="name" placeholder="Nombre" required>
        <input type="email" id="email" placeholder="Email" required>
        <textarea id="message" placeholder="Mensaje" required></textarea>
        <button type="submit">Enviar</button>
    </form>

    <p id="formStatus" class="status"></p>
</section>

<script>
const API_BASE = "https://portfolio-w7vi.onrender.com";

async function loadContacts() {
    const container = document.getElementById("contacts");

    try {
        const res = await fetch(`${API_BASE}/api/contact`);
        const json = await res.json();

        if (json.status !== "success") {
            throw new Error("Error cargando contactos");
        }

        container.innerHTML = "";

        json.data
        .sort((a, b) => b.id - a.id)
        .forEach((c, index) => {

            const div = document.createElement("div");
            div.className = "contact-card";

            if (index === 0) {
                div.classList.add("highlight");
            }

            const time = new Date().toLocaleTimeString();

            div.innerHTML = `
                <div class="contact-header">
                    <span class="contact-name">${escapeHTML(c.name)}</span>
                    <span class="contact-time">${time}</span>
                </div>

                <div class="contact-email">
                    ${escapeHTML(c.email)}
                </div>

                <div class="contact-message">
                    ${escapeHTML(c.message)}
                </div>
            `;

            container.appendChild(div);
        });

    } catch (e) {
        container.innerHTML = `<p class="error">${e.message}</p>`;
    }
}
    
// ==========================
// CONFIGURACIÓN DE ESTADOS
// ==========================
const STATUS_CONFIG = {
    active: { color: "#22c55e", label: "ACTIVE" },
    pending: { color: "#facc15", label: "PENDING" },
    error: { color: "#ef4444", label: "ERROR" }
};
    
// ==========================
// SERVICIOS (GET REAL)
// ==========================
async function loadServices() {
    const status = document.getElementById("servicesStatus");
    const container = document.getElementById("services");
       
    status.textContent = "Loading...";
    status.className = "status loading";

    try {
        const res = await fetch(`${API_BASE}/api/services`);
        const json = await res.json();

        console.log("SERVICES:", json);

        if (json.status !== "success") {
            throw new Error("Error en API servicios");
        }

        container.innerHTML = "";

      json.data.forEach(s => {
        const div = document.createElement("div");
        div.className = "card";
    
        let color = "#94a3b8"; // default
    
        if (s.status === "active") color = "#22c55e";
        if (s.status === "pending") color = "#facc15";
        if (s.status === "error") color = "#ef4444";
    
        const cfg = STATUS_CONFIG[s.status] || {
            color: "#94a3b8",
            label: s.status.toUpperCase()
        };
        
        div.innerHTML = `
            <strong>${escapeHTML(s.name)}</strong>
            <p style="color:${cfg.color}; font-weight:bold;">
                ● ${cfg.label}
            </p>
        `;
    
        container.appendChild(div);
        });

        status.textContent = "";
    } catch (e) {
        status.textContent = e.message;
        status.className = "status error";
    }
}

// ==========================
// CONTACTO (POST REAL)
// ==========================
document.getElementById("contactForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const status = document.getElementById("formStatus");

    const payload = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        message: document.getElementById("message").value
    };
    
    if (
        lastSent &&
        lastSent.email === payload.email &&
        lastSent.message === payload.message
    ) {
        status.textContent = "Mensaje duplicado";
        status.className = "status error";
        return;
    }

lastSent = payload;
    status.textContent = "Enviando...";
    status.className = "status loading";

    try {
        const res = await fetch(`${API_BASE}/api/contact`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const json = await res.json();

        if (json.status !== "success") {
            throw new Error(json.message || "Error en envío");
        }

        // ✔ ÉXITO
        status.textContent = "✔ Mensaje enviado y actualizado";
        status.className = "status success";

        e.target.reset();

        // 🔥 EXACTAMENTE AQUÍ
        await loadContacts();

    } catch (err) {
        status.textContent = err.message;
        status.className = "status error";
    }
});

// ==========================
// SEGURIDAD BÁSICA
// ==========================
function escapeHTML(str) {
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

// INIT
loadServices();
loadContacts();
</script>

</body>
</html>
