<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contacts Live</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: #e2e8f0;
    padding: 20px;
}

h1 {
    margin-bottom: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: #1e293b;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #334155;
}

th {
    background: #020617;
}

tr:hover {
    background: #334155;
}

#error {
    color: #f87171;
}
</style>

</head>
<body>

<h1>Contacts (Live API)</h1>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Message</th>
        </tr>
    </thead>
    <tbody id="tbody"></tbody>
</table>

<p id="error"></p>

<script>
const API_URL = "https://portfolio-w7vi.onrender.com/api/contact";

async function load() {
    try {
        const res = await fetch(API_URL);
        const json = await res.json();

        console.log("API:", json);

        if (json.status !== "success") {
            throw new Error("API inválida");
        }

        render(json.data);

    } catch (e) {
        document.getElementById("error").textContent = e.message;
        console.error(e);
    }
}

function render(data) {
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    data.forEach(c => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${escapeHTML(c.id)}</td>
            <td>${escapeHTML(c.name)}</td>
            <td>${escapeHTML(c.email)}</td>
            <td>${escapeHTML(c.message)}</td>
        `;

        tbody.appendChild(tr);
    });
}

// 🔐 Protección básica XSS (faltaba antes)
function escapeHTML(str) {
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

load();
</script>

</body>
</html>
