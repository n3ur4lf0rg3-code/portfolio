<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Full Stack Live</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: #e2e8f0;
    margin: 0;
}

section {
    padding: 40px;
}

h1, h2 {
    margin-bottom: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    margin-bottom: 10px;
}

input, textarea, button {
    display: block;
    width: 100%;
    margin-bottom: 10px;
    padding: 10px;
}

button {
    background: #22c55e;
    border: none;
    color: black;
    cursor: pointer;
}

.status {
    margin-top: 10px;
}

.error { color: #f87171; }
.success { color: #4ade80; }
.loading { color: #facc15; }
</style>
</head>

<body>

<!-- HERO -->
<section>
    <h1>Plataforma Full Stack (Live)</h1>
    <p>Datos consumidos desde API real</p>
</section>

<!-- SERVICIOS -->
<section>
    <h2>Servicios</h2>
    <div id="services"></div>
    <p id="servicesStatus" class="status"></p>
</section>

<!-- CONTACTO -->
<section>
    <h2>Contacto</h2>

    <form id="contactForm">
        <input type="text" id="name" placeholder="Nombre" required>
        <input type="email" id="email" placeholder="Email" required>
        <textarea id="message" placeholder="Mensaje" required></textarea>
        <button type="submit">Enviar</button>
    </form>

    <p id="formStatus" class="status"></p>
</section>

<script>
const API_BASE = "https://portfolio-w7vi.onrender.com";

// ==========================
// SERVICIOS (GET REAL)
// ==========================
async function loadServices() {
    const status = document.getElementById("servicesStatus");
    const container = document.getElementById("services");

    status.textContent = "Loading...";
    status.className = "status loading";

    try {
        const res = await fetch(`${API_BASE}/api/services`);
        const json = await res.json();

        console.log("SERVICES:", json);

        if (json.status !== "success") {
            throw new Error("Error en API servicios");
        }

        container.innerHTML = "";

        json.data.forEach(s => {
            const div = document.createElement("div");
            div.className = "card";
            div.innerHTML = `<strong>${escapeHTML(s.name)}</strong><p>Status:${escapeHTML(s.status)}</p>`;
            container.appendChild(div);
        });

        status.textContent = "";
    } catch (e) {
        status.textContent = e.message;
        status.className = "status error";
    }
}

// ==========================
// CONTACTO (POST REAL)
// ==========================
document.getElementById("contactForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const status = document.getElementById("formStatus");

    const payload = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        message: document.getElementById("message").value
    };

    status.textContent = "Enviando...";
    status.className = "status loading";

    try {
        const res = await fetch(`${API_BASE}/api/contact`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const json = await res.json();

        console.log("POST RESPONSE:", json);

        if (json.status !== "success") {
            throw new Error(json.message || "Error en envío");
        }

        status.textContent = "Mensaje enviado correctamente";
        status.className = "status success";

        e.target.reset();

    } catch (err) {
        status.textContent = err.message;
        status.className = "status error";
    }
});

// ==========================
// SEGURIDAD BÁSICA
// ==========================
function escapeHTML(str) {
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

// INIT
loadServices();
</script>

</body>
</html>
