<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Gear Shop | Visión sin Límites</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* Paleta de colores extraída de la imagen */
            --bg-cyberpunk: #0a0e17; /* Fondo muy oscuro */
            --glass-card: rgba(255, 255, 255, 0.03); /* Tarjeta translúcida */
            --accent-gold: #fbbf24; /* Color oro cyberpunk */
            --secondary-blue: #3b82f6; /* Azul neón de la imagen */
            --text-main: #f8fafc;
            --text-muted: rgba(248, 250, 252, 0.6);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-cyberpunk);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
        }

        /* 1. HEADER UNIFICADO (LOGO Y AUDIO) */
        .store-header {
            background-color: rgba(10, 14, 23, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-winged {
            color: var(--secondary-blue);
            font-size: 1.8rem;
        }

        .audio-player-panel {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.02);
            padding: 8px 15px;
            border-radius: 10px;
        }

        .audio-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.3s;
        }

        .audio-btn:hover { color: var(--accent-gold); }

        .volume-slider { width: 100px; }

        /* 2. BARRA DE CONTROL DE VISUALIZACIÓN */
        .display-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 20px 40px 0 40px;
            gap: 10px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .display-bar select {
            background: var(--glass-card);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            padding: 5px;
        }

        /* 3. GRID DE PRODUCTOS (SCROLL PROFESIONAL) */
        .grid-container {
            padding: 20px 40px;
            max-height: 75vh;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* Personalización de scrollbar */
        .grid-container::-webkit-scrollbar { width: 8px; }
        .grid-container::-webkit-scrollbar-track { background: var(--bg-cyberpunk); }
        .grid-container::-webkit-scrollbar-thumb { background: var(--secondary-blue); border-radius: 10px; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        /* 4. ESTILO DE TARJETA GLASSMORPHISM CYBERPUNK */
        .glass-card {
            background: var(--glass-card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: all 0.4s ease;
            position: relative;
        }

        .glass-card:hover {
            border-color: var(--secondary-blue);
            transform: translateY(-8px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.15);
        }

        .glass-card .stock-label {
            position: absolute;
            top: 15px;
            right: 15px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .glass-card .product-title { margin: 10px 0; font-size: 1.2rem; }
        
        .glass-card .product-desc { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 15px; }

        .glass-card .product-price { color: var(--accent-gold); font-weight: bold; font-size: 1.4rem; }

        /* Botón estilo cyberpunk */
        .buy-btn {
            background: transparent;
            color: var(--accent-gold);
            border: 2px solid var(--accent-gold);
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: all 0.3s;
            margin-top: 15px;
        }

        .buy-btn:hover { background: var(--accent-gold); color: var(--bg-cyberpunk); }

        .buy-btn:disabled { border-color: #334155; color: #334155; cursor: not-allowed; }

        /* Carrito flotante */
        .cart-trigger {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--secondary-blue); color: white; border: none;
            width: 60px; height: 60px; border-radius: 50%;
            cursor: pointer; z-index: 1001;
            font-size: 1.5rem; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <header class="store-header">
        <div class="logo-container">
            <i class="fas fa-winged-foot logo-winged"></i>
            <div>
                <h1 style="margin:0; font-size:1.5rem;">ELITE GEAR</h1>
                <p style="margin:0; font-size:0.8rem; color:var(--text-muted)">VISIÓN SIN LÍMITES</p>
            </div>
        </div>

        <div class="audio-player-panel">
            <small id="audio-status" style="color:var(--text-muted)">Reprod. ecomm.mp3</small>
            <button class="audio-btn" onclick="stopAudio()"><i class="fas fa-pause"></i></button>
            <i class="fas fa-volume-up" style="color:var(--text-muted)"></i>
            <input type="range" class="volume-slider" id="volume-control" min="0" max="1" step="0.1" value="0.5" oninput="adjustVolume()">
        </div>
    </header>

    <div class="display-bar">
        Mostrando 
        <select id="items-per-page" onchange="changePerPage()">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="50">50</option>
            <option value="100">100</option>
        </select>
        de <span id="total-products">100</span> productos
    </div>

    <div class="grid-container">
        <div class="product-grid" id="product-container">
            </div>
    </div>

    <button class="cart-trigger" onclick="toggleCartModal()">
        <i class="fas fa-shopping-basket"></i>
    </button>

    <audio id="ecomm-sound" src="assets/ecomm.mp3"></audio>

    <script>
        // ... Lógica JavaScript para cargar JSON y renderizar ...
        // Asegúrate de usar las clases CSS correctas (.glass-card, etc.) en el renderizado
    </script>
</body>
</html>
