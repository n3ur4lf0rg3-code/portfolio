<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Gear | Tienda Oficial</title>
    <!-- Font Awesome para los iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts para tipografía moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05070a;
            --panel-bg: rgba(15, 18, 25, 0.9);
            --accent-gold: #c5a059;
            --text-gold: #e5c07b;
            --blue-glow: #3b82f6;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        /* Estilos Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            /* Fondo con textura y gradiente inspirado en la imagen */
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.1), transparent 50%),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- ENCABEZADO CON REPRODUCTOR --- */
        header {
            background: linear-gradient(to bottom, #1a1c24, #0a0c10);
            padding: 10px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            height: 42px;
            filter: drop-shadow(0 0 5px var(--blue-glow));
        }

        .brand-text h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            line-height: 1;
        }

        .brand-text p {
            font-size: 0.55rem;
            color: var(--blue-glow);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Reproductor de Audio Central */
        .audio-player {
            flex: 1;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .track-info {
            font-size: 0.65rem;
            color: #888;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .progress-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .progress-rail {
            height: 4px;
            background: #111;
            flex: 1;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            width: 45%;
            height: 100%;
            background: linear-gradient(90deg, var(--blue-glow), #a5f3fc);
            box-shadow: 0 0 10px var(--blue-glow);
        }

        .control-btn {
            background: none;
            border: none;
            color: #333;
            cursor: pointer;
            font-size: 0.8rem;
            transition: color 0.2s;
        }

        .control-btn:hover { color: var(--accent-gold); }

        .play-pause-circle {
            background: rgba(255,255,255,0.03);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
            color: white;
        }

        /* --- BARRA DE FILTROS --- */
        .filter-bar {
            padding: 12px 40px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            background: rgba(0,0,0,0.4);
            font-size: 0.75rem;
            color: #64748b;
            gap: 15px;
            border-bottom: 1px solid var(--glass-border);
        }

        .filter-bar select {
            background: #0a0c10;
            color: var(--accent-gold);
            border: 1px solid var(--glass-border);
            padding: 4px 10px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
        }

        /* --- CUADRÍCULA DE PRODUCTOS --- */
        .main-scroll {
            flex: 1;
            padding: 20px 40px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--blue-glow) transparent;
        }

        .main-scroll::-webkit-scrollbar { width: 6px; }
        .main-scroll::-webkit-scrollbar-thumb { 
            background: var(--blue-glow); 
            border-radius: 10px;
            box-shadow: 0 0 10px var(--blue-glow);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr); /* 6 columnas como en la imagen */
            gap: 15px;
            padding-bottom: 40px;
        }

        /* Estilo Responsive para el Grid */
        @media (max-width: 1400px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 1000px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 700px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }

        /* TARJETA GLASSMORPHISM */
        .product-card {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            position: relative;
            transition: transform 0.3s, border-color 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            animation: cardFadeIn 0.5s ease forwards;
            opacity: 0;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.1);
        }

        .qty-label {
            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 0.65rem;
            color: #555;
            font-weight: 700;
        }

        .image-container {
            width: 100%;
            height: 110px;
            border-radius: 6px;
            background: #000;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .product-card:hover .image-container img {
            opacity: 1;
        }

        .product-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: var(--text-gold);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-info {
            font-size: 0.6rem;
            color: #64748b;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .stock-label {
            font-size: 0.55rem;
            color: #444;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .btn-add-cart {
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 7px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add-cart:hover {
            background: var(--accent-gold);
            color: black;
            box-shadow: 0 0 15px var(--accent-gold);
        }

        /* DECORACIÓN INFERIOR */
        .decoration-dots {
            position: fixed;
            bottom: 20px;
            left: 40px;
            display: flex;
            gap: 8px;
            opacity: 0.4;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--accent-gold);
            border-radius: 50%;
        }

    </style>
</head>
<body>

    <!-- Navegación Superior -->
    <header>
        <div class="brand">
            <img src="logo.jpg" alt="Logo Elite Gear" class="logo-img" onerror="this.src='https://via.placeholder.com/45/3b82f6/ffffff?text=E'">
            <div class="brand-text">
                <h1>ELITE GEAR</h1>
                <p>Visión Sin Límites</p>
            </div>
        </div>

        <div class="audio-player">
            <span class="track-info">REPRODUCIENDO: ecomm.mp3</span>
            <div class="player-controls">
                <button class="control-btn"><i class="fas fa-step-backward"></i></button>
                <div class="play-pause-circle">
                    <i class="fas fa-play" style="font-size: 0.8rem; cursor: pointer;"></i>
                </div>
                <button class="control-btn"><i class="fas fa-step-forward"></i></button>
                <div class="progress-container">
                    <div class="progress-rail">
                        <div class="progress-fill"></div>
                    </div>
                    <span style="font-size: 0.65rem; color: #444;">00:08</span>
                </div>
            </div>
        </div>

        <div style="width: 150px; display: flex; justify-content: flex-end; gap: 20px; color: #444;">
            <i class="fas fa-search" style="cursor: pointer;"></i>
            <i class="fas fa-shopping-bag" style="color: var(--accent-gold); cursor: pointer;"></i>
        </div>
    </header>

    <!-- Barra de Filtros -->
    <div class="filter-bar">
        <span>MOSTRAR:</span>
        <select id="items-filter" onchange="renderProducts()">
            <option value="5">5 PRODUCTOS</option>
            <option value="10" selected>10 PRODUCTOS</option>
            <option value="15">15 PRODUCTOS</option>
            <option value="50">50 PRODUCTOS</option>
        </select>
        <span>DE <span id="total-items">100</span> PRODUCTOS</span>
    </div>

    <!-- Contenido Principal -->
    <main class="main-scroll">
        <div class="product-grid" id="product-grid">
            <!-- Inyectado vía JavaScript -->
        </div>
    </main>

    <!-- Decoración visual lateral -->
    <div class="decoration-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <script>
        // Datos de productos (simulación de base de datos JSON)
        const catalog = [
            { name: "Teclado Mecánico Pro", info: "Latencia Cero - Switches Pro", stock: 15500, qty: "3x" },
            { name: "Teclado Mecánico RGB", info: "Iluminación 16M Colores", stock: 12500, qty: "1x" },
            { name: "Curved Monitor Pro", info: "Frecuencia 240Hz Ultra Slim", stock: 13909, qty: "1x" },
            { name: "Chair - Ergonomic", info: "Soporte Lumbar Grado Elite", stock: 15206, qty: "3x" },
            { name: "Chair - Gaming", info: "Base Reforzada 300lb", stock: 13506, qty: "3x" },
            { name: "Gaming Mouse Elite", info: "Sensor Óptico 20k DPI", stock: 32855, qty: "3x" },
            { name: "Aurora Pro Headset", info: "Sonido Espacial 7.1", stock: 11305, qty: "3x" }
        ];

        // Llenamos la base de datos hasta 100 items para la prueba
        const fullDatabase = [];
        for (let i = 0; i < 100; i++) {
            const base = catalog[i % catalog.length];
            fullDatabase.push({
                ...base,
                id: i,
                name: i < catalog.length ? base.name : `Hardware Pro #${i + 1}`
            });
        }

        const gridElement = document.getElementById('product-grid');
        const filterElement = document.getElementById('items-filter');
        const totalElement = document.getElementById('total-items');

        function renderProducts() {
            const limit = parseInt(filterElement.value);
            const itemsToShow = fullDatabase.slice(0, limit);
            totalElement.innerText = fullDatabase.length;

            gridElement.innerHTML = itemsToShow.map((product, index) => `
                <div class="product-card" style="animation-delay: ${index * 0.04}s">
                    <span class="qty-label">${product.qty}</span>
                    <div class="image-container">
                        <img src="ecommerce.jpg" alt="${product.name}" onerror="this.src='https://via.placeholder.com/200x120/111/333?text=ELITE+GEAR'">
                    </div>
                    <div>
                        <h3 class="product-name">${product.name}</h3>
                        <p class="product-info">${product.info}</p>
                        <div class="stock-label">STOCK: ${product.stock}</div>
                    </div>
                    <button class="btn-add-cart">Añadir al Carrito</button>
                </div>
            `).join('');
        }

        // Ejecutar al cargar
        window.onload = renderProducts;
    </script>
</body>
</html>
