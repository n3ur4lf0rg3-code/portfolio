<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Gear Shop | Shopping Experience</title>
    <!-- Importamos Font Awesome para el icono de carrito -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --accent: #fbbf24;
            --primary: #3b82f6;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #f8fafc;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; }

        /* HEADER */
        .store-header {
            padding: 60px 20px; text-align: center;
            background: linear-gradient(rgba(15,23,42,0.9), rgba(15,23,42,0.9)), url('../../images/fondo-hero.webp');
            background-size: cover;
        }

        /* BOTÓN DE CARRITO FLOTANTE */
        .cart-trigger {
            position: fixed; top: 20px; right: 20px;
            background: var(--primary); color: white; border: none;
            width: 60px; height: 60px; border-radius: 50%;
            cursor: pointer; z-index: 1001; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
            transition: transform 0.2s;
        }

        .cart-trigger:hover { transform: scale(1.1); }

        .cart-badge {
            position: absolute; top: 0; right: 0;
            background: var(--accent); color: var(--bg);
            font-size: 0.8rem; font-weight: bold; width: 22px; height: 22px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        /* CONTENEDOR DE PRODUCTOS */
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        #product-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px;
        }

        .product-card {
            background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px;
        }

        .buy-btn {
            background: var(--primary); color: white; border: none; padding: 12px;
            border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px;
        }

        /* MODAL DEL CARRITO */
        #cart-modal {
            position: fixed; top: 0; right: -100%; width: 350px; height: 100vh;
            background: #1e293b; transition: 0.4s; z-index: 1002;
            padding: 30px; box-shadow: -10px 0 30px rgba(0,0,0,0.5); overflow-y: auto;
        }

        #cart-modal.active { right: 0; }

        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid var(--glass);
        }

        .remove-btn {
            background: transparent; color: #ef4444; border: none; cursor: pointer; font-size: 1.1rem;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <!-- Icono de Carrito Flotante -->
    <button class="cart-trigger" onclick="toggleCart()">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-badge" id="cart-count">0</span>
    </button>

    <header class="store-header">
        <h1>Elite Gear Shop</h1>
        <p>Potencia tu flujo de trabajo con hardware premium</p>
    </header>

    <div class="container">
        <div id="product-container"></div>
    </div>

    <!-- Modal Lateral -->
    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div id="cart-modal" id="cart-modal">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Tu Carrito</h2>
            <button onclick="toggleCart()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
        </div>
        <div id="cart-items-list"></div>
        <div style="margin-top:20px; border-top: 1px solid var(--glass); padding-top:20px;">
            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:1.2rem;">
                <span>Total:</span> <span id="cart-total">$0.00</span>
            </div>
            <button class="buy-btn" style="background:var(--accent); color:var(--bg);">Finalizar Compra</button>
        </div>
    </div>

    <audio id="ecomm-sound" src="assets/ecomm.mp3"></audio>

    <script>
        // Recuperamos el carrito o inicializamos uno vacío
        let cart = JSON.parse(localStorage.getItem('eliteCartItems')) || [];

        async function loadProducts() {
            try {
                const response = await fetch('products.json');
                const data = await response.json();
                const container = document.getElementById('product-container');
                
                container.innerHTML = data.products.map(p => `
                    <div class="product-card">
                        <h3>${p.name}</h3>
                        <p style="color:var(--accent); font-weight:bold;">$${p.price.toFixed(2)}</p>
                        <button class="buy-btn" onclick="addToCart('${p.name}', ${p.price})">Añadir al Carrito</button>
                    </div>
                `).join('');
                updateUI();
            } catch (e) { console.error("Error al cargar JSON"); }
        }

        function addToCart(name, price) {
            const audio = document.getElementById("ecomm-sound");
            audio.currentTime = 0;
            audio.play().catch(() => {});

            // Creamos un ID único basado en el tiempo para poder eliminarlo después
            const item = { id: Date.now(), name, price };
            cart.push(item);
            saveAndRefresh();
        }

        function removeItem(id) {
            cart = cart.filter(item => item.id !== id);
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('eliteCartItems', JSON.stringify(cart));
            updateUI();
        }

        function updateUI() {
            // Actualizar badge del botón flotante
            document.getElementById('cart-count').innerText = cart.length;
            
            // Actualizar lista del modal
            const list = document.getElementById('cart-items-list');
            const totalEl = document.getElementById('cart-total');
            
            list.innerHTML = cart.length === 0 ? '<p>El carrito está vacío</p>' : 
                cart.map(item => `
                    <div class="cart-item">
                        <div>
                            <div style="font-weight:bold;">${item.name}</div>
                            <div style="font-size:0.8rem; color:var(--accent);">$${item.price.toFixed(2)}</div>
                        </div>
                        <button class="remove-btn" onclick="removeItem(${item.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalEl.innerText = `$${total.toFixed(2)}`;
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            const overlay = document.getElementById('overlay');
            modal.classList.toggle('active');
            overlay.style.display = modal.classList.contains('active') ? 'block' : 'none';
        }

        window.onload = loadProducts;
    </script>
</body>
</html>
