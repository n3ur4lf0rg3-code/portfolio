<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Gear Shop | JSON Powered</title>
    <style>
        :root {
            --bg: #0f172a;
            --accent: #fbbf24;
            --primary: #3b82f6;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
        }

        .store-header {
            height: 35vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), url('../../images/fondo-hero.webp');
            background-size: cover;
        }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

        /* Contenedor donde se cargarán los productos */
        #product-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
        }

        .product-card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .buy-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: var(--bg);
            padding: 15px 25px;
            border-radius: 10px;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <header class="store-header">
        <h1>Elite Gear Shop</h1>
        <div id="typing-text" style="color: var(--accent); font-weight: bold;"></div>
        <p>Carrito: <span id="cart-count">0</span> productos</p>
    </header>

    <div class="container">
        <div id="product-container">
            <!-- Los productos se cargan aquí mediante JavaScript -->
        </div>
    </div>

    <div id="toast"></div>
    <audio id="ecomm-sound" src="assets/ecomm.mp3"></audio>

    <script>
        // 1. CARGA DE JSON Y RENDERIZADO
        async function loadProducts() {
            try {
                const response = await fetch('products.json');
                const data = await response.json();
                renderProducts(data.products);
            } catch (error) {
                console.error("Error cargando el JSON:", error);
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('product-container');
            container.innerHTML = products.map(p => `
                <div class="product-card">
                    <div style="height:100px; background:rgba(0,0,0,0.2); border-radius:10px; margin-bottom:15px; display:flex; align-items:center; justify-content:center;">
                        ${p.category}
                    </div>
                    <h3>${p.name}</h3>
                    <p style="font-size:0.9rem; color:var(--text-dim);">${p.description}</p>
                    <h4 style="color:var(--accent)">$${p.price.toFixed(2)}</h4>
                    <button class="buy-btn" onclick="addToCart('${p.name}')">Añadir al Carrito</button>
                </div>
            `).join('');
        }

        // 2. LÓGICA DE CARRITO Y PERSISTENCIA (LocalStorage)
        let cartCount = localStorage.getItem('eliteCart') ? parseInt(localStorage.getItem('eliteCart')) : 0;
        document.getElementById('cart-count').innerText = cartCount;

        function addToCart(name) {
            // Sonido actualizado
            const audio = document.getElementById("ecomm-sound");
            audio.currentTime = 0;
            audio.play().catch(() => {});

            // Actualizar contador y LocalStorage
            cartCount++;
            document.getElementById('cart-count').innerText = cartCount;
            localStorage.setItem('eliteCart', cartCount);

            // Toast
            const toast = document.getElementById("toast");
            toast.innerText = `+1 ${name} añadido`;
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 2000);
        }

        // 3. EFECTO TYPING (Simplificado para el ejemplo)
        const phrases = ["Hardware Premium", "Entorno Profesional", "Elite Performance"];
        let pIdx = 0;
        function type() {
            document.getElementById("typing-text").innerText = phrases[pIdx];
            pIdx = (pIdx + 1) % phrases.length;
            setTimeout(type, 3000);
        }

        window.onload = () => {
            loadProducts();
            type();
        };
    </script>
</body>
</html>
