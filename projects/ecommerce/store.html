<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Gear Shop | Estructura Original</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #3b82f6;
            --accent: #fbbf24;
            --text-main: #f8fafc;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
        }

        /* BOTÓN FLOTANTE ORIGINAL */
        .cart-trigger {
            position: fixed; top: 25px; right: 25px;
            background: var(--secondary); color: white; border: none;
            width: 65px; height: 65px; border-radius: 50%;
            cursor: pointer; z-index: 1001; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
            transition: transform 0.2s;
        }

        @keyframes shake {
            0% { transform: scale(1); }
            50% { transform: scale(1.1) rotate(10deg); }
            100% { transform: scale(1); }
        }
        .shake-active { animation: shake 0.3s ease; }

        .cart-badge {
            position: absolute; top: 0; right: 0;
            background: var(--accent); color: var(--primary);
            font-size: 0.75rem; font-weight: bold; width: 24px; height: 24px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        /* DISEÑO DE TARJETAS ORIGINAL */
        .container { max-width: 1100px; margin: 60px auto; padding: 0 20px; }
        
        #product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            transition: 0.3s ease;
            text-align: center;
        }

        .glass-card:hover { border-color: var(--secondary); transform: translateY(-5px); }

        .buy-btn {
            background: var(--secondary);
            color: white; border: none; padding: 14px;
            border-radius: 12px; cursor: pointer; width: 100%;
            font-weight: bold; margin-top: 20px; transition: 0.3s;
        }

        .buy-btn:disabled { background: #334155; cursor: not-allowed; opacity: 0.5; }

        /* MODAL LATERAL */
        #cart-modal {
            position: fixed; top: 0; right: -400px; width: 380px; height: 100vh;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1002;
            padding: 40px; border-left: 1px solid rgba(255,255,255,0.1);
        }
        #cart-modal.active { right: 0; }

        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <button class="cart-trigger" id="cart-btn" onclick="toggleCart()">
        <i class="fas fa-shopping-basket"></i>
        <span class="cart-badge" id="cart-count">0</span>
    </button>

    <div class="container">
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Elite Gear Shop</h1>
        <p style="color: var(--secondary); margin-bottom: 40px;">Hardware de grado militar para desarrolladores.</p>
        
        <div id="product-grid">
            <!-- Render dinámico -->
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    
    <div id="cart-modal">
        <h2 style="color: var(--accent);">Tu Inventario</h2>
        <div id="cart-items-list" style="margin-top: 30px;"></div>
        <div style="margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
            <div style="display: flex; justify-content: space-between; font-size: 1.3rem;">
                <span>Total:</span>
                <span id="cart-total" style="color: var(--secondary); font-weight: bold;">$0.00</span>
            </div>
        </div>
    </div>

    <audio id="ecomm-sound" src="assets/ecomm.mp3"></audio>

    <script>
        let products = [];
        let cart = JSON.parse(localStorage.getItem('elite_cart_v2')) || {};

        async function loadStore() {
            try {
                const response = await fetch('products.json');
                const data = await response.json();
                products = data.products;
                renderStore();
                updateUI();
            } catch (e) { console.error("Error cargando base de datos."); }
        }

        function renderStore() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => {
                const inCart = cart[p.id] ? cart[p.id].qty : 0;
                const available = p.stock - inCart;

                return `
                    <div class="glass-card">
                        <div style="color:var(--secondary); font-size: 0.8rem; margin-bottom: 10px;">STOCK: ${available}</div>
                        <h3 style="margin: 0 0 10px 0;">${p.name}</h3>
                        <p style="color: var(--accent); font-size: 1.2rem; font-weight: bold; margin: 10px 0;">$${p.price.toFixed(2)}</p>
                        <button class="buy-btn" 
                                onclick="addToCart(${p.id})" 
                                ${available <= 0 ? 'disabled' : ''}>
                            ${available > 0 ? 'Añadir al Carrito' : 'Agotado'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            
            if (!cart[id]) {
                cart[id] = { ...product, qty: 1 };
            } else {
                if (cart[id].qty < product.stock) cart[id].qty++;
            }

            // Animación y Sonido
            const btn = document.getElementById('cart-btn');
            btn.classList.add('shake-active');
            document.getElementById('ecomm-sound').play().catch(()=>{});
            setTimeout(() => btn.classList.remove('shake-active'), 300);

            saveAndRefresh();
        }

        function removeItem(id) {
            if (cart[id].qty > 1) {
                cart[id].qty--;
            } else {
                delete cart[id];
            }
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('elite_cart_v2', JSON.stringify(cart));
            renderStore();
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('cart-items-list');
            const items = Object.values(cart);
            
            const totalQty = items.reduce((acc, item) => acc + item.qty, 0);
            document.getElementById('cart-count').innerText = totalQty;

            list.innerHTML = items.length === 0 ? '<p style="color:rgba(255,255,255,0.3);">No hay ítems seleccionados.</p>' : 
                items.map(item => `
                    <div class="cart-item">
                        <div>
                            <div style="font-weight:bold;">${item.name}</div>
                            <div style="font-size:0.85rem; color:var(--secondary);">${item.qty} unidad(es)</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:15px;">
                            <span>$${(item.price * item.qty).toFixed(2)}</span>
                            <button onclick="removeItem(${item.id})" class="remove-btn" style="background:none; border:none; color:#ef4444; cursor:pointer;">
                                <i class="fas fa-minus-circle"></i>
                            </button>
                        </div>
                    </div>
                `).join('');

            const totalMoney = items.reduce((acc, item) => acc + (item.price * item.qty), 0);
            document.getElementById('cart-total').innerText = `$${totalMoney.toFixed(2)}`;
        }

        function toggleCart() {
            document.getElementById('cart-modal').classList.toggle('active');
            document.getElementById('overlay').style.display = 
                document.getElementById('cart-modal').classList.contains('active') ? 'block' : 'none';
        }

        window.onload = loadStore;
    </script>
</body>
</html>
