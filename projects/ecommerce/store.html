<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Gear Shop | Inventory Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a; --accent: #fbbf24; --primary: #3b82f6;
            --glass: rgba(255, 255, 255, 0.05); --text: #f8fafc;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; }
        
        /* BOTÓN FLOTANTE */
        .cart-trigger {
            position: fixed; top: 20px; right: 20px; background: var(--primary);
            width: 60px; height: 60px; border-radius: 50%; border: none;
            cursor: pointer; z-index: 1001; color: white; font-size: 1.5rem;
        }
        .cart-badge {
            position: absolute; top: 0; right: 0; background: var(--accent);
            color: var(--bg); font-size: 0.8rem; width: 22px; height: 22px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        /* GRID Y CARDS */
        .container { max-width: 1100px; margin: 40px auto; padding: 20px; }
        #product-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .product-card { background: var(--glass); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .buy-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .out-of-stock { background: #475569 !important; cursor: not-allowed; opacity: 0.5; }

        /* MODAL LATERAL */
        #cart-modal {
            position: fixed; top: 0; right: -100%; width: 350px; height: 100vh;
            background: #1e293b; transition: 0.4s; z-index: 1002; padding: 30px;
        }
        #cart-modal.active { right: 0; }
        .cart-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--glass); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1000; }
        
        @keyframes shake { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(10deg); } 75% { transform: rotate(-10deg); } }
        .shake { animation: shake 0.3s ease; }
    </style>
</head>
<body>

    <button class="cart-trigger" id="cart-btn" onclick="toggleCart()">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-badge" id="cart-count">0</span>
    </button>

    <div class="container">
        <h1 style="text-align: center;">Elite Gear Shop</h1>
        <div id="product-container"></div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div id="cart-modal" id="cart-modal">
        <h2>Tu Carrito</h2>
        <div id="cart-items-list"></div>
        <div style="margin-top:20px; border-top: 1px solid var(--glass); padding-top:20px;">
            <h3>Total: <span id="cart-total">$0.00</span></h3>
        </div>
    </div>

    <audio id="ecomm-sound" src="assets/ecomm.mp3"></audio>

    <script>
        let productsData = [];
        let cart = JSON.parse(localStorage.getItem('eliteCartGrouped')) || [];

        async function init() {
            const res = await fetch('products.json');
            const data = await res.json();
            productsData = data.products;
            render();
            updateUI();
        }

        function render() {
            const container = document.getElementById('product-container');
            container.innerHTML = productsData.map(p => {
                const cartItem = cart.find(item => item.id === p.id);
                const currentQty = cartItem ? cartItem.quantity : 0;
                const isAvailable = currentQty < p.stock;

                return `
                <div class="product-card">
                    <h3>${p.name}</h3>
                    <p>Stock: ${p.stock - currentQty}</p>
                    <p style="color:var(--accent)">$${p.price.toFixed(2)}</p>
                    <button 
                        class="buy-btn ${!isAvailable ? 'out-of-stock' : ''}" 
                        style="background:var(--primary); color:white;"
                        onclick="addToCart(${p.id})"
                        ${!isAvailable ? 'disabled' : ''}>
                        ${isAvailable ? 'Añadir al Carrito' : 'Sin Stock'}
                    </button>
                </div>`;
            }).join('');
        }

        function addToCart(productId) {
            const product = productsData.find(p => p.id === productId);
            const cartItem = cart.find(item => item.id === productId);

            if (cartItem) {
                if (cartItem.quantity < product.stock) {
                    cartItem.quantity++;
                }
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            // Efectos
            const btn = document.getElementById('cart-btn');
            btn.classList.add('shake');
            document.getElementById('ecomm-sound').play().catch(()=>{});
            setTimeout(() => btn.classList.remove('shake'), 300);

            sync();
        }

        function removeItem(id) {
            const item = cart.find(i => i.id === id);
            if (item.quantity > 1) {
                item.quantity--;
            } else {
                cart = cart.filter(i => i.id !== id);
            }
            sync();
        }

        function sync() {
            localStorage.setItem('eliteCartGrouped', JSON.stringify(cart));
            render(); // Re-render para actualizar botones de stock
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('cart-items-list');
            const totalCount = cart.reduce((acc, item) => acc + item.quantity, 0);
            document.getElementById('cart-count').innerText = totalCount;

            list.innerHTML = cart.length === 0 ? '<p>Vacío</p>' : 
                cart.map(item => `
                <div class="cart-item">
                    <div>
                        <strong>${item.name}</strong><br>
                        <small>$${item.price} x ${item.quantity}</small>
                    </div>
                    <button onclick="removeItem(${item.id})" style="background:none; border:none; color:red; cursor:pointer;">
                        <i class="fas fa-minus-circle"></i>
                    </button>
                </div>`).join('');

            const total = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
        }

        function toggleCart() {
            document.getElementById('cart-modal').classList.toggle('active');
            document.getElementById('overlay').style.display = 
                document.getElementById('cart-modal').classList.contains('active') ? 'block' : 'none';
        }

        window.onload = init;
    </script>
</body>
</html>
