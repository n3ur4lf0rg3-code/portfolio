<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Gear Shop | UX Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --accent: #fbbf24;
            --primary: #3b82f6;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #f8fafc;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; }

        /* HEADER */
        .store-header {
            padding: 60px 20px; text-align: center;
            background: linear-gradient(rgba(15,23,42,0.9), rgba(15,23,42,0.9)), url('../../images/fondo-hero.webp');
            background-size: cover;
        }

        /* BOTÓN DE CARRITO CON ANIMACIÓN */
        .cart-trigger {
            position: fixed; top: 20px; right: 20px;
            background: var(--primary); color: white; border: none;
            width: 60px; height: 60px; border-radius: 50%;
            cursor: pointer; z-index: 1001; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
        }

        /* Animación de vibración */
        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(15deg); }
            50% { transform: rotate(-15deg); }
            75% { transform: rotate(15deg); }
            100% { transform: rotate(0deg); }
        }

        .shake-active { animation: shake 0.4s ease-in-out; }

        .cart-badge {
            position: absolute; top: 0; right: 0;
            background: var(--accent); color: var(--bg);
            font-size: 0.8rem; font-weight: bold; width: 22px; height: 22px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        /* PRODUCTOS Y MODAL */
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        #product-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        
        .product-card { background: var(--glass); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); }
        
        .buy-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 15px; }

        #cart-modal {
            position: fixed; top: 0; right: -100%; width: 350px; height: 100vh;
            background: #1e293b; transition: 0.4s; z-index: 1002; padding: 30px; overflow-y: auto;
        }
        #cart-modal.active { right: 0; }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--glass); }
        .remove-btn { background: transparent; color: #ef4444; border: none; cursor: pointer; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1000; }
    </style>
</head>
<body>

    <button class="cart-trigger" id="cart-button" onclick="toggleCart()">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-badge" id="cart-count">0</span>
    </button>

    <header class="store-header">
        <h1>Elite Gear Shop</h1>
        <p>Selección de Hardware para Programadores</p>
    </header>

    <div class="container">
        <div id="product-container"></div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div id="cart-modal" id="cart-modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h2>Carrito</h2>
            <button onclick="toggleCart()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
        </div>
        <div id="cart-items-list"></div>
        <div style="margin-top:20px; border-top: 1px solid var(--glass); padding-top:20px;">
            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:1.2rem;">
                <span>Total:</span> <span id="cart-total">$0.00</span>
            </div>
            <button class="buy-btn" style="background:var(--accent); color:var(--bg);">Proceder al Pago</button>
        </div>
    </div>

    <audio id="ecomm-sound" src="assets/ecomm.mp3"></audio>

    <script>
        let cart = JSON.parse(localStorage.getItem('eliteCartItems')) || [];

        async function init() {
            try {
                const res = await fetch('products.json');
                const data = await res.json();
                render(data.products);
                updateUI();
            } catch (e) { console.error("Error al iniciar."); }
        }

        function render(products) {
            document.getElementById('product-container').innerHTML = products.map(p => `
                <div class="product-card">
                    <h3>${p.name}</h3>
                    <p style="color:var(--accent)">$${p.price.toFixed(2)}</p>
                    <button class="buy-btn" onclick="addToCart('${p.name}', ${p.price})">Añadir al Carrito</button>
                </div>
            `).join('');
        }

        function addToCart(name, price) {
            const btn = document.getElementById('cart-button');
            const audio = document.getElementById("ecomm-sound");
            
            // Sonido y Animación
            audio.currentTime = 0;
            audio.play().catch(() => {});
            btn.classList.add('shake-active');
            setTimeout(() => btn.classList.remove('shake-active'), 400);

            cart.push({ id: Date.now() + Math.random(), name, price });
            sync();
        }

        function removeItem(id) {
            cart = cart.filter(i => i.id !== id);
            sync();
        }

        function sync() {
            localStorage.setItem('eliteCartItems', JSON.stringify(cart));
            updateUI();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-items-list');
            
            list.innerHTML = cart.length === 0 ? '<p>Vacío</p>' : 
                cart.map(item => `
                    <div class="cart-item">
                        <div>
                            <strong>${item.name}</strong><br>
                            <small>$${item.price.toFixed(2)}</small>
                        </div>
                        <button class="remove-btn" onclick="removeItem(${item.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `).join('');

            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
        }

        function toggleCart() {
            document.getElementById('cart-modal').classList.toggle('active');
            document.getElementById('overlay').style.display = 
                document.getElementById('cart-modal').classList.contains('active') ? 'block' : 'none';
        }

        window.onload = init;
    </script>
</body>
</html>
