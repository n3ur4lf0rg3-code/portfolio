<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Gear Shop | UX Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --accent: #fbbf24;
            --primary: #3b82f6;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #f8fafc;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; }

        .store-header {
            padding: 60px 20px; text-align: center;
            background: linear-gradient(rgba(15,23,42,0.9), rgba(15,23,42,0.9));
        }

        /* --- MÓDULO DE SCROLL PROFESIONAL --- */
        #product-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px;
            max-height: 65vh; /* Altura fija para activar scroll */
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        /* Estilizado de la barra de scroll (Webkit) */
        #product-container::-webkit-scrollbar { width: 8px; }
        #product-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        #product-container::-webkit-scrollbar-thumb { 
            background: var(--primary); 
            border-radius: 10px; 
        }

        /* --- SELECTOR DE PAGINACIÓN CORREGIDO --- */
        .pagination-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 20px;
            gap: 12px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .pagination-bar select {
            background: #1e293b; /* Fondo sólido oscuro para asegurar visibilidad */
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 12px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s;
        }
        
        .pagination-bar select:hover {
            border-color: var(--primary);
        }
        
        /* Forzar color de fondo y texto en las opciones desplegables */
        .pagination-bar select option {
            background-color: #0f172a; /* Color de fondo oscuro */
            color: #ffffff;            /* Texto blanco */
            padding: 10px;
        }

        .cart-trigger {
            position: fixed; top: 20px; right: 20px;
            background: var(--primary); color: white; border: none;
            width: 60px; height: 60px; border-radius: 50%;
            cursor: pointer; z-index: 1001; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
        }

        /* Panel de Control de Audio Profesional */
        .audio-controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 1001;
        }
        
        .audio-controls input[type="range"] {
            width: 80px;
            cursor: pointer;
        }
        
        .audio-btn {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            font-size: 1.1rem;
        }

        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(15deg); }
            50% { transform: rotate(-15deg); }
            100% { transform: rotate(0deg); }
        }
        .shake-active { animation: shake 0.4s ease-in-out; }

        .cart-badge {
            position: absolute; top: 0; right: 0;
            background: var(--accent); color: var(--bg);
            font-size: 0.8rem; font-weight: bold; width: 22px; height: 22px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .product-card { background: var(--glass); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .buy-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 15px; }

        #cart-modal {
            position: fixed; top: 0; right: -100%; width: 350px; height: 100vh;
            background: #1e293b; transition: 0.4s; z-index: 1002; padding: 30px; overflow-y: auto;
        }
        #cart-modal.active { right: 0; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--glass); }
        .remove-btn { background: transparent; color: #ef4444; border: none; cursor: pointer; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1000; }
    </style>
</head>
<body>

    <button class="cart-trigger" id="cart-button" onclick="toggleCart()">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-badge" id="cart-count">0</span>
    </button>

    <header class="store-header">
        <h1>Elite Gear Shop</h1>
        <p>Catálogo Premium (100+ Artículos)</p>
    </header>

    <div class="container">
        <!-- Barra de control modular -->
        <div class="pagination-bar">
            <span>Mostrar artículos:</span>
            <select id="view-count" onchange="updateViewCount()">
                <option value="5">5 productos</option>
                <option value="10" selected>10 productos</option>
                <option value="50">50 productos</option>
                <option value="100">Ver todos (100)</option>
            </select>
        </div>

        <div id="product-container"></div>
    </div>
    <!-- Panel de Control Multimedia -->
    <div class="audio-controls">
        <button class="audio-btn" onclick="toggleMute()" id="mute-icon">
            <i class="fas fa-volume-up"></i>
        </button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5" oninput="adjustVolume()">
        <button class="audio-btn" onclick="stopAudio()">
            <i class="fas fa-stop"></i>
        </button>
    </div>

    <!-- Asegúrate de que la ruta sea correcta -->
    <audio id="ecomm-sound" src="/assets/ecomm.mp3" preload="auto"></audio>
    
    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div id="cart-modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h2>Tu Inventario</h2>
            <button onclick="toggleCart()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
        </div>
        <div id="cart-items-list"></div>
        <div style="margin-top:20px; border-top: 1px solid var(--glass); padding-top:20px;">
            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:1.2rem;">
                <span>Total:</span> <span id="cart-total">$0.00</span>
            </div>
            <button class="buy-btn" style="background:var(--accent); color:var(--bg);">Finalizar Orden</button>
        </div>
    </div>

    <audio id="ecomm-sound" src="assets/ecomm.mp3"></audio>

    <script>
        let allProducts = []; // Almacén de los 100 artículos
        let cart = JSON.parse(localStorage.getItem('eliteCartItems')) || [];
        let displayLimit = 10; // Límite por defecto

        async function init() {
            try {
                const res = await fetch('products.json');
                const data = await res.json();
                allProducts = data.products;
                render();
                updateUI();
            } catch (e) { console.error("Error al cargar productos."); }
        }

        // Función para cambiar cantidad visible
        function updateViewCount() {
            displayLimit = parseInt(document.getElementById('view-count').value);
            render();
            document.getElementById('product-container').scrollTop = 0; // Reset scroll al cambiar vista
        }

        function render() {
            const container = document.getElementById('product-container');
            // Segmentación modular: tomamos solo una parte del array total
            const visibleProducts = allProducts.slice(0, displayLimit);

            container.innerHTML = visibleProducts.map(p => {
                const cartItem = cart.find(i => i.id === p.id);
                const currentQty = cartItem ? cartItem.quantity : 0;
                const available = p.stock - currentQty;

                return `
                    <div class="product-card">
                        <small style="color:${available < 3 ? 'var(--accent)' : 'rgba(255,255,255,0.5)'}">
                            Stock: ${available}
                        </small>
                        <h3>${p.name}</h3>
                        <p style="color:var(--accent)">$${p.price.toFixed(2)}</p>
                        <button class="buy-btn" 
                            onclick="addToCart(${p.id})" 
                            ${available <= 0 ? 'disabled style="opacity:0.5; cursor:not-allowed"' : ''}>
                            ${available > 0 ? 'Añadir al Carrito' : 'Agotado'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        function addToCart(id) {
            const product = allProducts.find(p => p.id === id);
            const cartItem = cart.find(item => item.id === id);

            if (cartItem) {
                if (cartItem.quantity < product.stock) {
                    cartItem.quantity++;
                } else { return; }
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            // Animación y sonido
            const btn = document.getElementById('cart-button');
            const audio = document.getElementById("ecomm-sound");
            audio.currentTime = 0;
            audio.play().catch(() => {});
            btn.classList.add('shake-active');
            setTimeout(() => btn.classList.remove('shake-active'), 400);

            sync();
        }

        function removeItem(id) {
            const index = cart.findIndex(i => i.id === id);
            if (index > -1) {
                if (cart[index].quantity > 1) {
                    cart[index].quantity--;
                } else {
                    cart.splice(index, 1);
                }
            }
            sync();
        }

        function sync() {
            localStorage.setItem('eliteCartItems', JSON.stringify(cart));
            render();
            updateUI();
        }

        function updateUI() {
            const totalItems = cart.reduce((acc, item) => acc + item.quantity, 0);
            document.getElementById('cart-count').innerText = totalItems;
            
            const list = document.getElementById('cart-items-list');
            list.innerHTML = cart.length === 0 ? '<p>Vacío</p>' : 
                cart.map(item => `
                    <div class="cart-item">
                        <div>
                            <strong>${item.name}</strong> x${item.quantity}<br>
                            <small>$${(item.price * item.quantity).toFixed(2)}</small>
                        </div>
                        <button class="remove-btn" onclick="removeItem(${item.id})">
                            <i class="fas fa-minus-circle"></i>
                        </button>
                    </div>
                `).join('');

            const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
        }

        function toggleCart() {
            document.getElementById('cart-modal').classList.toggle('active');
            document.getElementById('overlay').style.display = 
                document.getElementById('cart-modal').classList.contains('active') ? 'block' : 'none';
        }

        // Variable global para el audio
const audioEffect = document.getElementById("ecomm-sound");

        // Inicializamos el volumen al cargar
        window.onload = () => {
            init();
            audioEffect.volume = 0.5; 
        };
        
        function adjustVolume() {
            const slider = document.getElementById('volume-slider');
            audioEffect.volume = slider.value;
        }
        
        function toggleMute() {
            audioEffect.muted = !audioEffect.muted;
            const icon = document.getElementById('mute-icon');
            icon.innerHTML = audioEffect.muted ? 
                '<i class="fas fa-volume-mute"></i>' : 
                '<i class="fas fa-volume-up"></i>';
        }
        
        function stopAudio() {
            audioEffect.pause();
            audioEffect.currentTime = 0;
        }
        
        // Función addToCart actualizada para asegurar reproducción
        function addToCart(id) {
            const product = allProducts.find(p => p.id === id);
            const cartItem = cart.find(item => item.id === id);
        
            if (cartItem) {
                if (cartItem.quantity < product.stock) {
                    cartItem.quantity++;
                } else { return; }
            } else {
                cart.push({ ...product, quantity: 1 });
            }
        
            // DISPARO DE AUDIO CORREGIDO
            // Reiniciamos el tiempo para que suene aunque se pulse rápido
            audioEffect.currentTime = 0;
            audioEffect.play().catch(error => {
                console.warn("El navegador bloqueó el audio. Interactúa con la página primero.");
            });
        
            const btn = document.getElementById('cart-button');
            btn.classList.add('shake-active');
            setTimeout(() => btn.classList.remove('shake-active'), 400);
        
            sync();
        }
        window.onload = init;
    </script>
</body>
</html>
