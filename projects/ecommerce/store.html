<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Gear Shop | Shopping Cart</title>
    <style>
        :root {
            --bg: #0f172a;
            --accent: #fbbf24;
            --primary: #3b82f6;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #f8fafc;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; }

        .store-header {
            padding: 40px; text-align: center;
            background: linear-gradient(rgba(15,23,42,0.9), rgba(15,23,42,0.9)), url('../../images/fondo-hero.webp');
            background-size: cover; border-bottom: 1px solid var(--glass);
        }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

        #product-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px;
        }

        .product-card {
            background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; transition: 0.3s;
        }

        .buy-btn {
            background: var(--primary); color: white; border: none; padding: 12px;
            border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px;
        }

        /* MODAL DEL CARRITO */
        #cart-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1e293b; padding: 30px; border-radius: 20px; border: 2px solid var(--primary);
            width: 90%; max-width: 500px; display: none; z-index: 1000; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--glass); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 900; }
        
        #toast { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: var(--bg); padding: 15px; border-radius: 10px; display: none; }
    </style>
</head>
<body>

    <header class="store-header">
        <h1>Elite Gear Shop</h1>
        <p>Productos en carrito: <span id="cart-count">0</span></p>
        <button onclick="toggleCart()" style="background:var(--accent); border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">Ver Carrito</button>
    </header>

    <div class="container">
        <div id="product-container"></div>
    </div>

    <!-- MODAL -->
    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div id="cart-modal">
        <h2>Tu Carrito</h2>
        <div id="cart-items-list"></div>
        <hr style="border:0; border-top:1px solid var(--glass); margin:20px 0;">
        <div style="display:flex; justify-content:space-between; font-weight:bold;">
            <span>Total:</span> <span id="cart-total">$0.00</span>
        </div>
        <button onclick="clearCart()" style="margin-top:20px; background:transparent; color:white; border:1px solid red; padding:10px; border-radius:8px; width:100%; cursor:pointer;">Vaciar Carrito</button>
    </div>

    <div id="toast"></div>
    <audio id="ecomm-sound" src="assets/ecomm.mp3"></audio>

    <script>
        let cart = JSON.parse(localStorage.getItem('eliteCartItems')) || [];

        async function loadProducts() {
            const response = await fetch('products.json');
            const data = await response.json();
            const container = document.getElementById('product-container');
            
            container.innerHTML = data.products.map(p => `
                <div class="product-card">
                    <h3>${p.name}</h3>
                    <p>$${p.price.toFixed(2)}</p>
                    <button class="buy-btn" onclick="addToCart('${p.name}', ${p.price})">Comprar</button>
                </div>
            `).join('');
            updateUI();
        }

        function addToCart(name, price) {
            const audio = document.getElementById("ecomm-sound");
            audio.currentTime = 0;
            audio.play().catch(() => {});

            cart.push({ name, price });
            localStorage.setItem('eliteCartItems', JSON.stringify(cart));
            updateUI();
            showToast(name);
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-items-list');
            const totalEl = document.getElementById('cart-total');
            
            list.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <span>${item.name}</span>
                    <span>$${item.price.toFixed(2)}</span>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalEl.innerText = `$${total.toFixed(2)}`;
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            const overlay = document.getElementById('overlay');
            const isVisible = modal.style.display === 'block';
            modal.style.display = isVisible ? 'none' : 'block';
            overlay.style.display = isVisible ? 'none' : 'block';
        }

        function clearCart() {
            cart = [];
            localStorage.removeItem('eliteCartItems');
            updateUI();
            toggleCart();
        }

        function showToast(name) {
            const t = document.getElementById("toast");
            t.innerText = `${name} añadido`;
            t.style.display = "block";
            setTimeout(() => t.style.display = "none", 2000);
        }

        window.onload = loadProducts;
    </script>
</body>
</html>
