<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Elite | Consultoría & Software</title>
    <style>
        /* CONFIGURACIÓN ESTÉTICA AVANZADA */
        :root {
            --primary: #020617;
            --secondary: #3b82f6;
            --accent: #10b981; /* Verde esmeralda para éxito */
            --glass: rgba(255, 255, 255, 0.05);
            --text-p: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--primary);
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

        /* ESTILO GLASSMORPHISM REFORZADO */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }

        /* ANIMACIÓN DE TESTIMONIOS */
        #testimonial-container {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-style: italic;
            transition: opacity 0.5s ease;
        }

        /* FORMULARIO DINÁMICO */
        .form-group { margin-bottom: 1.5rem; }
        input, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--secondary); outline: none; }
        
        .btn-submit {
            background: #334155;
            color: #94a3b8;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: not-allowed;
            transition: 0.3s;
        }
        .btn-submit.active {
            background: var(--secondary);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.5);
        }

        .status-msg { font-size: 0.8rem; margin-top: 5px; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <!-- CABECERA -->
        <header style="padding: 100px 0; text-align: center;">
            <h1 style="font-size: 3rem; margin-bottom: 10px;">Ingeniería de <span style="color:var(--secondary)">Software</span></h1>
            <p style="color: var(--text-p)">Código robusto para desafíos globales.</p>
        </header>

        <!-- SECCIÓN: TESTIMONIOS DINÁMICOS -->
        <section class="glass-panel">
            <h2 style="text-align: center; font-size: 1rem; color: var(--secondary); letter-spacing: 2px;">OPINIONES DE CLIENTES</h2>
            <div id="testimonial-container">
                <p id="testimonial-text">"Excelente profesionalismo y entrega a tiempo."</p>
            </div>
        </section>

        <!-- SECCIÓN: CONTACTO E INTERACCIÓN -->
        <section class="glass-panel">
            <h2>Hablemos de tu proyecto</h2>
            <form id="contact-form">
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="user-email" placeholder="ejemplo@correo.com">
                    <span id="email-hint" class="status-msg"></span>
                </div>
                <div class="form-group">
                    <label>Mensaje</label>
                    <textarea id="user-msg" rows="4" placeholder="¿En qué puedo ayudarte?"></textarea>
                </div>
                <button type="button" id="submit-btn" class="btn-submit">Enviar Propuesta</button>
            </form>
        </section>
    </div>

    <script>
        /* 1. LÓGICA DE TESTIMONIOS (ARRAY DINÁMICO) */
        const testimonios = [
            "\"La mejor inversión en desarrollo para nuestra startup.\" - CEO TechFlow",
            "\"Arquitectura limpia y escalable. Altamente recomendado.\" - Lead Dev Global",
            "\"Capacidad analítica excepcional para problemas complejos.\" - Director Innovación"
        ];
        let tIndex = 0;

        function rotarTestimonios() {
            const el = document.getElementById("testimonial-text");
            el.style.opacity = 0; // Efecto de desvanecimiento
            
            setTimeout(() => {
                tIndex = (tIndex + 1) % testimonios.length;
                el.innerText = testimonios[tIndex];
                el.style.opacity = 1;
            }, 500);
        }
        setInterval(rotarTestimonios, 4000); // Cambia cada 4 segundos

        /* 2. VALIDACIÓN DE FORMULARIO EN TIEMPO REAL */
        const emailInput = document.getElementById("user-email");
        const msgInput = document.getElementById("user-msg");
        const submitBtn = document.getElementById("submit-btn");
        const hint = document.getElementById("email-hint");

        function validar() {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const isEmailValid = emailRegex.test(emailInput.value);
            const isMsgValid = msgInput.value.length > 10;

            if (isEmailValid) {
                hint.innerText = "Correo válido ✓";
                hint.style.color = "var(--accent)";
            } else {
                hint.innerText = "Introduce un correo real";
                hint.style.color = "#ef4444";
            }

            if (isEmailValid && isMsgValid) {
                submitBtn.classList.add("active");
                submitBtn.disabled = false;
            } else {
                submitBtn.classList.remove("active");
                submitBtn.disabled = true;
            }
        }

        emailInput.addEventListener("input", validar);
        msgInput.addEventListener("input", validar);

        /* 3. SIMULACIÓN DE ENVÍO */
        submitBtn.addEventListener("click", () => {
            submitBtn.innerText = "¡Mensaje Enviado!";
            submitBtn.style.background = "var(--accent)";
            document.getElementById("contact-form").reset();
            setTimeout(() => {
                submitBtn.innerText = "Enviar Propuesta";
                submitBtn.classList.remove("active");
                validar();
            }, 3000);
        });
    </script>
</body>
</html>
