<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Senior | FullStack Developer</title>
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #3b82f6;
            --accent: #fbbf24;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary);
            color: var(--text-main);
            margin: 0;
            scroll-behavior: smooth;
        }

        /* BARRA DE PROGRESO */
        #progress-bar {
            position: fixed;
            top: 0; left: 0;
            height: 4px;
            background: var(--secondary);
            width: 0%;
            z-index: 1000;
        }

        /* HEADER */
        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                        url('images/fondo-hero.webp');
            background-size: cover;
            background-position: center;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 2rem; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 2rem;
            margin: 2rem 0;
        }

        .img-fluid {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* FORMULARIO Y NUEVA IMAGEN */
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            align-items: center;
        }

        @media (max-width: 768px) {
            .contact-grid { grid-template-columns: 1fr; }
        }

        input, textarea {
            width: 100%; padding: 12px; margin-bottom: 1rem;
            background: rgba(0,0,0,0.3); border: 1px solid var(--text-dim);
            color: white; border-radius: 8px; box-sizing: border-box;
        }

        .btn-submit {
            padding: 12px 24px; border: none; border-radius: 8px;
            background: #334155; color: var(--text-dim);
            cursor: not-allowed; width: 100%; font-weight: bold;
            transition: 0.3s;
        }

        .btn-submit.active {
            background: var(--secondary); color: white; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="progress-bar"></div>

    <header>
        <h1 id="hero-title" style="font-size: 3rem; margin: 0;"></h1>
        <p style="color: var(--accent);">Innovación a través del Código</p>
    </header>

    <div class="container">
        
        <!-- SECCIÓN: TECNOLOGÍAS -->
        <section class="glass-card">
            <h2>Stack Tecnológico</h2>
            <img src="images/tecnologias.webp" alt="Tecnologías" class="img-fluid">
            <p>Dominio de herramientas modernas para soluciones escalables.</p>
        </section>

        <!-- SECCIÓN: PROYECTOS/UI -->
        <section class="glass-card">
            <h2>Interfaces de Usuario</h2>
            <img src="images/dashboard.webp" alt="UI Dashboard" class="img-fluid">
            <p>Diseño centrado en la usabilidad y la estética profesional.</p>
        </section>

        <!-- SECCIÓN: CONTACTO (CON LA NUEVA IMAGEN) -->
        <section class="glass-card">
            <h2 style="color: var(--secondary);">¿Listo para construir?</h2>
            <div class="contact-grid">
                <div>
                    <!-- NUEVA IMAGEN DE CONTACTO -->
                    <img src="images/contacto.webp" alt="Let's Build" class="img-fluid">
                </div>
                <div>
                    <form id="contact-form">
                        <input type="email" id="email" placeholder="tu@email.com">
                        <textarea id="message" rows="5" placeholder="Cuéntame sobre tu proyecto..."></textarea>
                        <button type="button" id="submit-btn" class="btn-submit" disabled>Enviar Mensaje</button>
                    </form>
                </div>
            </div>
        </section>

    </div>

    <script>
        // EFECTO DE ESCRITURA
        const text = "Desarrollo Digital de Élite";
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("hero-title").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 80);
            }
        }

        // BARRA DE PROGRESO
        window.onscroll = () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        };

        // VALIDACIÓN DE FORMULARIO
        const email = document.getElementById("email");
        const message = document.getElementById("message");
        const btn = document.getElementById("submit-btn");

        function validate() {
            const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value);
            const isMsg = message.value.trim().length > 10;
            if (isEmail && isMsg) {
                btn.classList.add("active");
                btn.disabled = false;
            } else {
                btn.classList.remove("active");
                btn.disabled = true;
            }
        }

        email.addEventListener("input", validate);
        message.addEventListener("input", validate);

        window.onload = typeWriter;
    </script>
</body>
</html>
