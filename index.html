<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Elite | Dynamic Edition</title>
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #3b82f6;
            --accent: #fbbf24;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
        }

        /* ANIMACIONES DE REVELACIÓN */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* CURSOR PARPADEANTE */
        #cursor {
            border-left: 3px solid var(--secondary);
            margin-left: 5px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        #progress-bar {
            position: fixed;
            top: 0; left: 0;
            height: 4px;
            background: linear-gradient(to right, var(--secondary), var(--accent));
            width: 0%;
            z-index: 1000;
        }

        header {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                        url('images/fondo-hero.webp');
            background-size: cover;
            background-attachment: fixed;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 2rem; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2.5rem;
            margin: 3rem 0;
        }

        .img-fluid {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            transition: transform 0.5s ease;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            align-items: center;
        }

        @media (max-width: 768px) { .contact-grid { grid-template-columns: 1fr; } }

        input, textarea {
            width: 100%; padding: 14px; margin-bottom: 1rem;
            background: rgba(0,0,0,0.4); border: 1px solid var(--text-dim);
            color: white; border-radius: 10px; box-sizing: border-box;
        }

        .btn-submit {
            padding: 14px; border: none; border-radius: 10px;
            background: #334155; color: var(--text-dim);
            cursor: not-allowed; width: 100%; font-weight: bold;
        }

        .btn-submit.active {
            background: var(--secondary); color: white; cursor: pointer;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body>

    <div id="progress-bar"></div>

    <header>
        <div style="min-height: 120px;">
            <h1 style="font-size: 3.5rem; margin: 0; display: inline;" id="typewriter"></h1>
            <span id="cursor"></span>
        </div>
        <p class="reveal" style="color: var(--accent); font-weight: 500; margin-top: 20px;">Soluciones Full-Stack de Alto Rendimiento</p>
    </header>

    <div class="container">
        
        <section class="glass-card reveal">
            <h2 style="color: var(--secondary);">Ingeniería Digital</h2>
            <img src="images/tecnologias.webp" alt="Tecnologías" class="img-fluid">
            <p>Construyendo el futuro mediante arquitecturas escalables y código limpio.</p>
        </section>

        <section class="glass-card reveal">
            <h2>Interfaces Inteligentes</h2>
            <img src="images/dashboard.webp" alt="UI Dashboard" class="img-fluid">
            <p>Transformando datos complejos en experiencias de usuario simples y potentes.</p>
        </section>

        <section class="glass-card reveal">
            <h2 style="color: var(--secondary);">Iniciemos un Proyecto</h2>
            <div class="contact-grid">
                <div>
                    <img src="images/contacto.webp" alt="Let's Build" class="img-fluid">
                </div>
                <div>
                    <form id="contact-form">
                        <input type="email" id="email" placeholder="tu@correo.com">
                        <textarea id="message" rows="5" placeholder="¿Cuál es tu próximo gran desafío técnico?"></textarea>
                        <button type="button" id="submit-btn" class="btn-submit" disabled>Enviar Propuesta</button>
                    </form>
                </div>
            </div>
        </section>

    </div>

    <script>
        // 1. CONFIGURACIÓN DEL TYPING DINÁMICO
        const typewriterElement = document.getElementById("typewriter");
        const phrases = [
            "Código de Vanguardia",
            "Sistemas Escalables",
            "Diseño que Impacta",
            "Arquitectura Senior",
            "Innovación Full-Stack"
        ];
        
        let phraseIndex = 0;
        let characterIndex = 0;
        let isDeleting = false;
        let typeSpeed = 150;

        function handleType() {
            const currentPhrase = phrases[phraseIndex];
            
            if (isDeleting) {
                typewriterElement.textContent = currentPhrase.substring(0, characterIndex - 1);
                characterIndex--;
                typeSpeed = 75; // El borrado es más rápido
            } else {
                typewriterElement.textContent = currentPhrase.substring(0, characterIndex + 1);
                characterIndex++;
                typeSpeed = 150;
            }

            // Lógica de cambio de estado
            if (!isDeleting && characterIndex === currentPhrase.length) {
                isDeleting = true;
                typeSpeed = 2000; // Pausa al final de la frase
            } else if (isDeleting && characterIndex === 0) {
                isDeleting = false;
                phraseIndex = (phraseIndex + 1) % phrases.length;
                typeSpeed = 500; // Pausa antes de empezar nueva frase
            }

            setTimeout(handleType, typeSpeed);
        }

        // 2. INTERSECTION OBSERVER
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.15 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // 3. SCROLL PROGRESS
        window.onscroll = () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        };

        // 4. VALIDACIÓN
        const email = document.getElementById("email");
        const message = document.getElementById("message");
        const btn = document.getElementById("submit-btn");

        function validate() {
            const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value);
            const isMsg = message.value.trim().length > 10;
            btn.classList.toggle("active", isEmail && isMsg);
            btn.disabled = !(isEmail && isMsg);
        }

        email.addEventListener("input", validate);
        message.addEventListener("input", validate);

        // INICIO
        window.onload = handleType;
    </script>
</body>
</html>
